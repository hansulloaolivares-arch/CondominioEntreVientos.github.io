<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard Financiero - Comunidad</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        .table-container::-webkit-scrollbar { height: 8px; }
        .table-container::-webkit-scrollbar-track { background: #f1f1f1; }
        .table-container::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 4px; }
        .table-container::-webkit-scrollbar-thumb:hover { background: #94a3b8; }
        .loader { border-top-color: #3498db; -webkit-animation: spinner 1.5s linear infinite; animation: spinner 1.5s linear infinite; }
        @keyframes spinner { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body class="bg-[#f0f2f5] text-gray-800 p-4 md:p-8 font-sans">
    
    <div class="max-w-7xl mx-auto space-y-6">
        <header class="flex flex-col md:flex-row justify-between items-start md:items-center">
            <div>
                <h1 class="text-3xl font-bold text-black">Status Financiero</h1>
                <p class="text-sm text-gray-500 mt-1">Condominio El Amanecer</p>
            </div>
            <button class="mt-4 md:mt-0 bg-white border border-gray-300 text-blue-600 px-4 py-2 rounded-md shadow-sm text-sm font-medium hover:bg-gray-50">
                Filtros (Próximamente)
            </button>
        </header>

        <!-- Loading Indicator -->
        <div id="loading-state" class="flex justify-center items-center py-10">
            <div class="loader ease-linear rounded-full border-4 border-t-4 border-gray-200 h-12 w-12 mb-4"></div>
            <span class="ml-4 text-gray-600 font-medium">Sincronizando con Google Sheets...</span>
        </div>

        <div id="dashboard-content" class="hidden space-y-6">
            <!-- KPIs -->
            <div class="grid grid-cols-1 md:grid-cols-3 gap-6">
                <div class="bg-white rounded-lg shadow-sm p-6 text-center">
                    <h2 class="text-gray-500 text-sm font-medium uppercase">Caja</h2>
                    <div class="mt-2 text-3xl font-light text-gray-900" id="kpi-caja">--</div>
                </div>
                <div class="bg-white rounded-lg shadow-sm p-6 text-center">
                    <h2 class="text-gray-500 text-sm font-medium uppercase">Deuda Acumulada</h2>
                    <div class="text-xs text-red-500 mt-1">Deuda</div>
                    <div class="mt-1 text-3xl font-light text-red-600" id="kpi-deuda">--</div>
                </div>
                <div class="bg-white rounded-lg shadow-sm p-6 text-center">
                    <h2 class="text-gray-500 text-sm font-medium uppercase">Total Reparaciones</h2>
                    <div class="text-xs text-gray-400 mt-1">MontoReparación</div>
                    <div class="mt-1 text-3xl font-light text-gray-900" id="kpi-reparaciones">--</div>
                </div>
            </div>

            <!-- Porcentajes -->
            <div class="grid grid-cols-1 md:grid-cols-3 gap-6">
                <div class="md:col-start-2 bg-white rounded-lg shadow-sm p-6 text-center">
                    <h2 class="text-gray-500 text-sm font-medium uppercase">% Pagado</h2>
                    <div class="text-xs text-blue-500 mt-1">% adherencia</div>
                    <div class="mt-1 text-3xl font-light text-blue-600" id="kpi-adherencia">--</div>
                </div>
                <div class="bg-white rounded-lg shadow-sm p-6 text-center">
                    <h2 class="text-gray-500 text-sm font-medium uppercase">% Deuda</h2>
                    <div class="text-xs text-red-400 mt-1">% Deuda</div>
                    <div class="mt-1 text-3xl font-light text-red-600" id="kpi-p-deuda">--</div>
                </div>
            </div>

            <!-- Gráfico y Reparaciones -->
            <div class="grid grid-cols-1 lg:grid-cols-2 gap-6">
                <div class="bg-white rounded-lg shadow-sm p-6">
                    <h2 class="text-center text-gray-600 text-lg mb-4">Mora VS pago</h2>
                    <div class="relative h-64 w-full">
                        <canvas id="moraChart"></canvas>
                    </div>
                </div>
                <div class="bg-white rounded-lg shadow-sm p-0 overflow-hidden flex flex-col">
                    <h2 class="text-center text-gray-600 text-lg p-4 border-b">Reparaciones</h2>
                    <div class="overflow-x-auto table-container flex-grow p-4">
                        <table class="min-w-full text-sm text-left">
                            <thead class="text-xs text-white uppercase bg-[#2a3542]">
                                <tr>
                                    <th class="px-6 py-3">NombreReparación</th>
                                    <th class="px-6 py-3">MontoReparación</th>
                                    <th class="px-6 py-3">Fecha</th>
                                </tr>
                            </thead>
                            <tbody id="table-reparaciones" class="text-gray-600 bg-white">
                                <!-- Data insertada vía JS -->
                            </tbody>
                        </table>
                    </div>
                </div>
            </div>

            <!-- Adherencia / Apertura -->
            <div class="bg-white rounded-lg shadow-sm p-0 overflow-hidden">
                <h2 class="text-center text-gray-600 text-lg p-4 border-b">Apertura (Adherencia)</h2>
                <div class="overflow-x-auto table-container p-4">
                    <table class="min-w-full text-sm text-center">
                        <thead class="text-xs text-white uppercase bg-[#2a3542]" id="apertura-head">
                            <!-- Columnas dinámicas -->
                        </thead>
                        <tbody id="table-apertura" class="text-gray-600 bg-white">
                            <!-- Filas dinámicas -->
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>

    <script>
        // ID DEL SPREADSHEET
        const SHEET_ID = '1lcySRnqq8ViScL9iVtvpPbSU-Pp1RHLEUxwfM23O5uo';
        
        // Función asíncrona de extracción de datos (Arquitectura O(1) en llamadas a red por endpoint)
        async function fetchGoogleSheet(sheetName) {
            const url = `https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?tqx=out:json&sheet=${encodeURIComponent(sheetName)}`;
            try {
                const res = await fetch(url);
                if (!res.ok) throw new Error(`HTTP ${res.status}`);
                const txt = await res.text();
                const jsonStr = txt.match(/(?<=.*\().*(?=\);)/s)[0];
                return JSON.parse(jsonStr).table;
            } catch (error) {
                console.error(`[Falla de Integración] No se pudo leer la hoja "${sheetName}":`, error);
                return null;
            }
        }

        const formatter = new Intl.NumberFormat('es-CL', { style: 'currency', currency: 'CLP' });

        async function initApp() {
            // Ejecución concurrente para evitar bloqueos de hilo principal (I/O multiplexing)
            // AQUÍ SE REFLEJA LA ACTUALIZACIÓN DE LAS VARIABLES EXACTAS
            const [reparacionesData, cajaData, sociosData, adherenciaData] = await Promise.all([
                fetchGoogleSheet('Reparaciones'),
                fetchGoogleSheet('CajaConReparaciones'),
                fetchGoogleSheet('SociosAlDia'),
                fetchGoogleSheet('Adherencia')
            ]);

            // Desmontar estado de carga (UI transition)
            document.getElementById('loading-state').style.display = 'none';
            document.getElementById('dashboard-content').classList.remove('hidden');

            // Lógica de inyección en el DOM para 'Reparaciones'
            if (reparacionesData && reparacionesData.rows) {
                let totalReparaciones = 0;
                const repTable = document.getElementById('table-reparaciones');
                repTable.innerHTML = reparacionesData.rows.map((row, i) => {
                    // Manejo robusto de errores de tipado (Type Safety Check)
                    const nombre = row.c[0]?.v || 'Registro sin nombre';
                    const monto = row.c[1]?.v || 0;
                    const fecha = row.c[2]?.f || row.c[2]?.v || '--';
                    
                    totalReparaciones += typeof monto === 'number' ? monto : 0;
                    
                    return `
                        <tr class="${i % 2 === 0 ? 'bg-white' : 'bg-gray-50'} border-b hover:bg-gray-100 transition-colors">
                            <td class="px-6 py-2">${nombre}</td>
                            <td class="px-6 py-2 font-medium text-gray-800">${formatter.format(monto)}</td>
                            <td class="px-6 py-2 text-gray-500">${fecha}</td>
                        </tr>
                    `;
                }).join('');
                
                // Actualizar KPI de Reparaciones
                document.getElementById('kpi-reparaciones').innerText = formatter.format(totalReparaciones);
            }

            // Datos mockeados temporalmente para los otros KPIs hasta mapear estructura de columnas
            document.getElementById('kpi-caja').innerText = '$999.390'; 
            document.getElementById('kpi-deuda').innerText = '$325.000';
            document.getElementById('kpi-adherencia').innerText = '91,9 %';
            document.getElementById('kpi-p-deuda').innerText = '8,1 %';

            // Inicialización de la librería gráfica
            const ctx = document.getElementById('moraChart').getContext('2d');
            new Chart(ctx, {
                type: 'bar',
                data: {
                    labels: ['T1', 'T2', 'T3', 'T4', 'T1 26', 'T2 26'],
                    datasets: [
                        { label: 'Caja', data: [250000, 300000, 300000, 300000, 300000, 300000], backgroundColor: '#007bff' },
                        { label: 'Deuda', data: [0, 0, 0, 0, 75000, 250000], backgroundColor: '#dc3545' }
                    ]
                },
                options: { responsive: true, maintainAspectRatio: false }
            });
        }

        // Listener de ciclo de vida del DOM
        document.addEventListener('DOMContentLoaded', initApp);
    </script>
</body>
</html>
